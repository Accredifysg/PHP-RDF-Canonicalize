name: Pull Request

on:
  pull_request:

jobs:
  actionlint:
    name: Lint GitHub Actions workflows
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Download actionlint
        id: get_actionlint
        run: bash <(curl https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)
        shell: bash
      - name: Check workflow files
        run: ${{ steps.get_actionlint.outputs.executable }} -color
        shell: bash

  ci:
    name: Continuous Integration
    uses: ./.github/workflows/ci.yml

  # TEMPORARY: run Sonar on PRs to validate the setup before relying on main.yml.
  # Remove this job once the analysis is confirmed working on main.
  sonar:
    needs: ci
    name: SonarQube Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # full history for SCM blame

      - name: Download Backend Coverage Report
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.ci.outputs.backend-coverage-artifact-name }}
          path: coverage_BE

      - name: Download Backend JUnit Report
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.ci.outputs.backend-junit-artifact-name }}
          path: junit_BE

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v8.2.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
